# ============================================================
#  番茄小说数据采集 - Docker Compose 编排
#
#  服务说明:
#    mitmproxy        : 抓包代理与控制接口
#    android-emulator : 运行 Android 模拟器
#    fq-app           : 番茄小说采集 Python 应用
#
#  使用方式:
#    docker compose up -d mitmproxy android-emulator   # 先启动代理和模拟器
#    docker compose run --rm fq-app          # 交互式进入采集容器
# ============================================================

services:

  mitmproxy:
    image: mitmproxy/mitmproxy:10.2.4
    environment:
      # 仅记录这些主机的流量（逗号分隔）。
      - MITM_CAPTURE_HOSTS=${MITM_CAPTURE_HOSTS:-sinfonlineb.fqnovel.com}
      # 诊断模式默认关闭，避免混入非业务事件。
      - MITM_DEBUG_EVENTS=${MITM_DEBUG_EVENTS:-0}
    command:
      - mitmdump
      - --listen-host
      - 0.0.0.0
      - --listen-port
      - "8080"
      - -s
      - /addons/mitmproxy_addon.py
    ports:
      - "8080:8080"
    volumes:
      - ./mitmproxy_addon.py:/addons/mitmproxy_addon.py:ro
      - mitmproxy-data:/home/mitmproxy/.mitmproxy

  # ──────────────────────────────────────────────
  #  Android 模拟器
  #  镜像文档: https://github.com/budtmo/docker-android
  #  需要宿主机开启 KVM:  ls /dev/kvm
  # ──────────────────────────────────────────────
  android-emulator:
    image: budtmo/docker-android:emulator_11.0
    privileged: true
    environment:
      - EMULATOR_DEVICE=Samsung Galaxy S10
      - WEB_VNC=true            # 开启 noVNC Web 界面，可在浏览器观察模拟器
      - APPIUM=false
    ports:
      - "6080:6080"             # noVNC Web 界面: http://localhost:6080
      - "5554:5554"             # Android 模拟器控制台端口
      - "5555:5555"             # ADB TCP 端口
    # devices:
    #   - /dev/kvm:/dev/kvm     # KVM硬件加速 - Linux VM不支持，已注释（模拟器启动会较慢）
    volumes:
      - android-data:/root      # 模拟器数据持久化
    healthcheck:
      test: ["CMD-SHELL", "adb -s localhost:5555 get-state 2>/dev/null | grep -q device"]
      interval: 30s
      timeout: 10s
      retries: 30               # 无KVM加速，需要更多重试次数
      start_period: 300s        # 无KVM加速，模拟器启动很慢（5分钟启动期）

  # ──────────────────────────────────────────────
  #  番茄小说采集 Python 应用
  # ──────────────────────────────────────────────
  fq-app:
    build:
      context: ..               # 构建上下文为 fqDataAPI/ 目录
      dockerfile: Docker/Dockerfile
    environment:
      # Android 模拟器地址，entrypoint 脚本会自动执行 adb connect
      - ANDROID_DEVICE=android-emulator:5555
      # mitmproxy 地址。entrypoint 会用它配置 Android 系统代理。
      - MITM_PROXY=mitmproxy:8080
      # requests 库自动读取 HTTP_PROXY/HTTPS_PROXY，使 mitm.capture 控制请求经由 mitmproxy addon 处理。
      - HTTP_PROXY=http://mitmproxy:8080
      - HTTPS_PROXY=http://mitmproxy:8080
      - CAPTURE_BACKEND_LABEL=mitmproxy
      - CAPTURE_CONTROL_HOST=mitm.capture
      # 不代理本地容器内地址
      - NO_PROXY=localhost,127.0.0.1,android-emulator
    volumes:
      - ../data:/app/data       # 采集数据挂载到宿主机，方便查看
      - ../logs:/app/logs       # 日志挂载到宿主机
      - mitmproxy-data:/mitmproxy:ro
    depends_on:
      mitmproxy:
        condition: service_started
      android-emulator:
        condition: service_healthy
    stdin_open: true
    tty: true
    # 默认进入交互式 bash，手动运行采集脚本
    # 如需自动运行，可改为: command: python searchbook.py

volumes:
  android-data:
  mitmproxy-data:
